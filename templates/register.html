{% extends "base.html" %}

{% block content %}
<div class="row justify-content-center py-5">
    <div class="col-md-6 col-lg-5">
        <div class="glass-card p-5">
            <div class="text-center mb-4">
                <i class="bi bi-person-plus text-primary display-4"></i>
                <h2 class="mt-3">{{ _('Create an Account') }}</h2>
                <p class="text-secondary">{{ _('Join us to get your CV analyzed') }}</p>
            </div>
            
            <form method="POST" action="">
                <input type="hidden" name="csrf_token" value="{{ csrf_token() }}"/>
                <div class="row">
                    <div class="col-md-6 mb-3">
                        <label class="form-label text-secondary">{{ _('First Name') }}</label>
                        <input type="text" class="form-control form-control-lg" name="first_name" required>
                    </div>
                    <div class="col-md-6 mb-3">
                        <label class="form-label text-secondary">{{ _('Last Name') }}</label>
                        <input type="text" class="form-control form-control-lg" name="last_name" required>
                    </div>
                </div>
                
                <div class="mb-3">
                    <label class="form-label text-secondary">{{ _('Email address') }}</label>
                    <input type="email" class="form-control form-control-lg" name="email" required>
                </div>
                
                <div class="mb-4">
                    <label class="form-label text-secondary">{{ _('Password') }}</label>
                    <input type="password" class="form-control form-control-lg" name="password" required>
                </div>
                
                <button type="submit" class="btn btn-primary btn-lg w-100 rounded-pill">{{ _('Sign Up') }}</button>
            </form>
            
            <div class="text-center mt-4 pt-3 border-top border-secondary opacity-50">
                <p class="mb-0 text-secondary">{{ _('Already have an account?') }} <a href="{{ url_for('auth.login') }}" class="text-primary text-decoration-none">{{ _('Login here') }}</a></p>
            </div>
        </div>
    </div>
</div>
{% endblock %}
